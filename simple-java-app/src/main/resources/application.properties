server.port=8080
spring.application.name=simple-java-app

# MongoDB — falls back to localhost when running outside Docker
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/userdb}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:userdb}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=simple-java-app
info.app.version=1.0.0
